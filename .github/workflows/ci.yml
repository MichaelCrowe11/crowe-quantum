name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.package }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        package:
          - core
          - synapse
          - qubit-flow
          - quantum-net
          - quantum-hub
          - quantum-viz
          - quantum-audio
          - trinity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install all packages (local cross-dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"
          pip install -e "packages/synapse[dev]"
          pip install -e "packages/qubit-flow[dev]"
          pip install -e "packages/quantum-net[dev]"
          pip install -e "packages/quantum-hub[dev]"
          pip install -e "packages/quantum-viz[dev]"
          pip install -e "packages/quantum-audio[dev]"
          pip install -e "packages/trinity[dev]"
      - name: Lint
        run: ruff check packages/${{ matrix.package }}/src/
      - name: Test
        run: pytest packages/${{ matrix.package }}/tests/ --cov --cov-report=term-missing -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/
