name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.package }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        package:
          - core
          - synapse
          - qubit-flow
          - quantum-net
          - quantum-hub
          - quantum-viz
          - quantum-audio
          - trinity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy sympy scipy matplotlib pytest pytest-cov ruff
      - name: Install all packages (local monorepo)
        run: |
          pip install --no-deps -e packages/core
          pip install --no-deps -e packages/synapse
          pip install --no-deps -e packages/qubit-flow
          pip install --no-deps -e packages/quantum-net
          pip install --no-deps -e packages/quantum-hub
          pip install --no-deps -e packages/quantum-viz
          pip install --no-deps -e packages/quantum-audio
          pip install --no-deps -e packages/trinity
      - name: Lint
        run: ruff check packages/${{ matrix.package }}/src/
      - name: Test
        run: pytest packages/${{ matrix.package }}/tests/ --cov --cov-report=term-missing -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/
