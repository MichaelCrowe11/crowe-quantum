[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crowe-synapse"
version = "3.0.1"
description = "Scientific reasoning language with uncertainty propagation and symbolic math — part of the Crowe Quantum Platform"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Michael Crowe", email = "Crowelogicos@gmail.com"}]
keywords = ["scientific", "reasoning", "uncertainty", "symbolic", "language"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "crowe-quantum-core>=1.0.0",
    "numpy>=2.0.0",
    "scipy>=1.14.0",
    "sympy>=1.14.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4.0"]

[project.urls]
Repository = "https://github.com/MichaelCrowe11/crowe-quantum"

[tool.setuptools.packages.find]
where = ["src"]
