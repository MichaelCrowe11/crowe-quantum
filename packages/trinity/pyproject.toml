[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crowe-quantum-trinity"
version = "1.0.0"
description = "The complete Crowe Quantum Platform — unified quantum computing, scientific reasoning, and creative expression"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Michael Crowe", email = "Crowelogicos@gmail.com"}]
keywords = ["quantum", "computing", "science", "music", "platform"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "crowe-quantum-core>=1.0.0",
    "crowe-qubit-flow>=2.0.0",
    "crowe-synapse>=3.0.0",
    "crowe-quantum-viz>=1.0.0",
    "crowe-quantum-hub>=1.0.0",
    "crowe-quantum-net>=1.0.0",
    "crowe-quantum-audio>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4.0"]

[project.urls]
Repository = "https://github.com/MichaelCrowe11/crowe-quantum"

[tool.setuptools.packages.find]
where = ["src"]
